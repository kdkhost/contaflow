version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: contaflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: contaflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: contaflow-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile
    container_name: contaflow-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3333
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/contaflow
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-contaflow-jwt-secret-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-contaflow-refresh-secret-production}
    ports:
      - '3333:3333'

  nginx:
    image: nginx:alpine
    container_name: contaflow-nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - '80:80'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  postgres_data:
  redis_data:
